<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResiPro Multi-Size PRO</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root { --p: #ff4500; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; }
        .card { background: #fff; max-width: 400px; margin: auto; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--p); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .padd { padding: 20px; text-align: center;}
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin: 10px 0 3px; text-align: left;}
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        #log { margin-top: 15px; font-size: 11px; color: var(--p); min-height: 20px;}
    </style>
</head>
<body>

<div class="card">
    <div class="header">🖨️ RESI PRO (SAVE KERTAS)</div>
    <div class="padd">
        <label>UKURAN PRINTER</label>
        <select id="size">
            <option value="283.46">100mm (Label Thermal)</option>
            <option value="226.77">80mm (Printer Sedang)</option>
            <option value="164.41">58mm (Printer Kecil)</option>
        </select>
        <label>NAMA TOKO</label>
        <input type="text" id="toko" placeholder="Contoh: Bang Bel">
        <label>LOGO (PNG/JPG)</label>
        <input type="file" id="logo" accept="image/*">
        <label>PDF RESI</label>
        <input type="file" id="pdf" accept="application/pdf" multiple>
        <button onclick="prosesSaveKertas()">GABUNG & CETAK SEKARANG</button>
        <div id="log">Siap...</div>
    </div>
</div>

<script>
    async function prosesSaveKertas() {
        const pdfIn = document.getElementById('pdf').files;
        const toko = document.getElementById('toko').value || "TOKO SAYA";
        const targetW = parseFloat(document.getElementById('size').value);
        const log = document.getElementById('log');
        
        if (pdfIn.length === 0) return alert("Pilih resi dulu!");
        log.innerText = "Meracik resi anti-boros...";

        try {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const pdfOut = await PDFDocument.create();
            const fontBold = await pdfOut.embedFont(StandardFonts.HelveticaBold);
            
            // Tinggi kertas fleksibel, kita set standar label dulu (15cm)
            const targetH = 425.20; 

            // Proses Logo
            let imgLogo = null;
            const logoFile = document.getElementById('logo').files[0];
            if (logoFile) {
                const b = await logoFile.arrayBuffer();
                imgLogo = await pdfOut.embedPng(b).catch(() => pdfOut.embedJpg(b));
            }

            for (const f of pdfIn) {
                const bytes = await f.arrayBuffer();
                const pdfLama = await PDFDocument.load(bytes);
                const [halEmbed] = await pdfOut.embedPdf(pdfLama, [0]);
                const page = pdfOut.addPage([targetW, targetH]);

                // --- JURUS AUTO-ZOOM & ANTI-BOROS ---
                // Resi A4 biasanya lebar ~595pt. Label Tokopedia/Shopee ~210pt.
                // Kita akan "tarik" label kecil itu agar lebarnya PENUH di kertas thermal (misal 100mm = ~283pt).
                // Kita hitung skalanya berdasarkan lebar kertas thermal, bukan lebar A4 asli.
                
                const factor_resi_A4 = 0.45; // Rasio lebar resi di A4 Tokopedia
                const skala_auto_zoom = targetW / (595 * factor_resi_A4); // Zoom label penuh lebar kertas

                page.drawPage(halEmbed, {
                    x: 0,
                    y: targetH - (halEmbed.height * skala_auto_zoom * 0.9), // Tempel atas
                    width: halEmbed.width * skala_auto_zoom, // Tarik lebar penuh
                    height: halEmbed.height * skala_auto_zoom // Tarik tinggi penuh
                });

                // --- AREA BRANDING BARU ---
                // Logo & Nama Toko
                if (imgLogo) page.drawImage(imgLogo, { x: 5, y: 35, width: 25, height: 25 });
                page.drawText(toko, { x: imgLogo ? 35 : 5, y: 43, size: 14, font: fontBold, color: rgb(0,0,0) });

                // --- WAJIB VIDEO UNBOXING (Gede, Bold, Estetik) ---
                // Kita buat tulisan merah, besar, dan letakkan tepat di bawah logo/nama toko
                page.drawText("WAJIB VIDEO UNBOXING UNTUK KLAIM!", {
                    x: 5, 
                    y: 15, // Di bawah logo/nama
                    size: 11, // Lebih gede!
                    font: fontBold, // Bold berkarakter!
                    color: rgb(0.85, 0, 0) // Merah mencolok!
                    
                });
            }

            const res = await pdfOut.save();
            const url = URL.createObjectURL(new Blob([res], {type: 'application/pdf'}));
            const a = document.createElement('a');
            a.href = url;
            a.download = `RESI_${targetW < 200 ? '58mm' : targetW < 250 ? '80mm' : '100mm'}_SAVE_KERTAS.pdf`;
            a.click();
            log.innerHTML += "<br><b>SUKSES! CEK DOWNLOAD.</b>";
        } catch (e) { log.innerText = "Error: " + e.message; console.error(e); }
    }
</script>
</body>
</html>
