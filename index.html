<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResiPro Fixed v6.0</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root { --p: #ff4500; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: #fff; max-width: 350px; margin: auto; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
        .header { background: var(--p); color: white; padding: 15px; font-weight: bold; }
        .padd { padding: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #log { margin-top: 15px; font-size: 11px; background: #eee; padding: 10px; border-radius: 5px; text-align: left; max-height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">🖨️ RESI PRO PREMIUM (FIXED)</div>
    <div class="padd">
        <input type="text" id="toko" placeholder="Contoh: Cimol Bang Bel">
        <input type="file" id="logo" accept="image/*">
        <label style="font-size: 11px; color: #666; display: block; text-align: left;">Pilih Resi PDF (Bisa Banyak sekaligus):</label>
        <input type="file" id="pdf" accept="application/pdf" multiple>
        <button id="btn" onclick="prosesBaja()">GABUNG & CETAK RESI</button>
        <div id="log">Status: Siap kirim paket!</div>
    </div>
</div>

<script>
    async function prosesBaja() {
        const btn = document.getElementById('btn');
        const log = document.getElementById('log');
        const pdfIn = document.getElementById('pdf').files;
        const toko = document.getElementById('toko').value || "TOKO SAYA";

        if (pdfIn.length === 0) return alert("Pilih resi dulu!");

        btn.disabled = true;
        log.innerHTML = "Memulai proses...";

        try {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const pdfOut = await PDFDocument.create();
            const fontBold = await pdfOut.embedFont(StandardFonts.HelveticaBold);
            
            // PAKSA UKURAN THERMAL 100x150mm (point)
            const LEBAR_FIX = 283.46;
            const TINGGI_FIX = 425.20;

            // Proses Logo
            let imgLogo = null;
            const logoFile = document.getElementById('logo').files[0];
            if (logoFile) {
                const bytes = await logoFile.arrayBuffer();
                imgLogo = await pdfOut.embedPng(bytes).catch(() => pdfOut.embedJpg(bytes));
            }

            for (const file of pdfIn) {
                log.innerHTML += "<br>> Baca: " + file.name;
                const buffer = await file.arrayBuffer();
                const pdfLama = await PDFDocument.load(buffer);
                
                // Gunakan embedPdf (Cara paling stabil untuk PDF marketplace)
                const [halEmbed] = await pdfOut.embedPdf(pdfLama, [0]);
                
                // Tambah halaman baru dengan ukuran kaku (Fix)
                const page = pdfOut.addPage([LEBAR_FIX, TINGGI_FIX]);

                // JURUS ANTI-GEPENG: Kita kasih angka mati untuk width & height
                // Asumsi standar resi A4 adalah lebar ~595pt. Kita skalakan paksa.
                const SKALA_PAKSA = 0.47; 

                // Gambar Resi di posisi PALING ATAS
                page.drawPage(halEmbed, {
                    x: 0,
                    y: TINGGI_FIX - (595 * SKALA_PAKSA * 1.5), // Tempel atas (Paksa koordinat)
                    width: LEBAR_FIX, // Paksa lebar penuh 100mm
                    height: 425 // Paksa tinggi
                });

                // --- AREA BRANDING DI BAWAH ---
                // Logo & Nama Toko
                if (imgLogo) page.drawImage(imgLogo, { x: 5, y: 35, width: 25, height: 25 });
                page.drawText(toko, { x: imgLogo ? 35 : 5, y: 43, size: 12, font: fontBold, color: rgb(0,0,0) });

                // --- WAJIB VIDEO UNBOXING (Gede & Bingkai Merah) ---
                const txt = "WAJIB VIDEO UNBOXING UNTUK KLAIM!";
                const s = 9; // Size
                const wTxt = fontBold.widthOfTextAtSize(txt, s);
                
                // Bingkai Merah
                page.drawRectangle({
                    x: 4,
                    y: 10,
                    width: wTxt + 10,
                    height: s + 8,
                    color: rgb(1, 1, 1),
                    borderWidth: 1.5,
                    borderColor: rgb(0.9, 0, 0),
                    borderOpacity: 0.9,
                });
                
                // Teks Merah
                page.drawText(txt, { x: 9, y: 17, size: s, font: fontBold, color: rgb(0.8, 0, 0) });
            }

            log.innerHTML += "<br>> Menyimpan file...";
            const res = await pdfOut.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([res], {type: 'application/pdf'}));
            link.download = "RESI_FIXED_SIAP_PRINT.pdf";
            link.click();
            log.innerHTML += "<br><b>BERHASIL! CEK DOWNLOAD.</b>";
        } catch (e) {
            log.innerHTML += "<br><span style='color:red'>Gagal: " + e.message + "</span>";
            console.error(e);
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
