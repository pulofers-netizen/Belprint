<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResiPro Press Layout</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root { --orange: #ff4500; }
        body { font-family: sans-serif; background: #f4f7f9; padding: 15px; margin: 0; text-align: center; }
        .card { background: #fff; max-width: 400px; margin: auto; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 20px; }
        .header { background: var(--orange); color: white; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--orange); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 11px; color: var(--orange); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">🖨️ RESI PRO ANTI-BOROS</div>
    <select id="size">
        <option value="283.46">Kertas 100mm</option>
        <option value="226.77">Kertas 80mm</option>
        <option value="164.41">Kertas 58mm</option>
    </select>
    <input type="text" id="toko" placeholder="Nama Toko (Contoh: Cimol)">
    <input type="file" id="logo" accept="image/*">
    <input type="file" id="pdf" accept="application/pdf" multiple>
    <button onclick="prosesPress()">PROSES & PRESS LAYOUT</button>
    <div id="status">Siap...</div>
</div>

<script>
    async function prosesPress() {
        const pdfFiles = document.getElementById('pdf').files;
        const tokoName = document.getElementById('toko').value || "TOKO SAYA";
        const targetW = parseFloat(document.getElementById('size').value);
        const status = document.getElementById('status');

        if (pdfFiles.length === 0) return alert("Pilih resi dulu!");
        status.innerText = "Sedang memotong area kosong...";

        try {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;
            const pdfOut = await PDFDocument.create();
            const fontBold = await pdfOut.embedFont(StandardFonts.HelveticaBold);

            // Kita pakai tinggi yang pas (tidak terlalu panjang biar hemat)
            // Untuk label 100x150mm, tinggi total 425pt.
            const targetH = 425.20; 

            let logoImg = null;
            if (document.getElementById('logo').files[0]) {
                const b = await document.getElementById('logo').files[0].arrayBuffer();
                logoImg = await pdfOut.embedPng(b).catch(() => pdfOut.embedJpg(b));
            }

            for (const f of pdfFiles) {
                const bytes = await f.arrayBuffer();
                const pdfIn = await PDFDocument.load(bytes);
                const [halEmbed] = await pdfOut.embedPdf(pdfIn, [0]);
                const page = pdfOut.addPage([targetW, targetH]);

                // --- LOGIKA CROP & ZOOM (BIAR GEDE & GAK BOROS) ---
                // Kita cuma ambil area atas resi (0.45 dari tinggi A4)
                const cropHeight = halEmbed.height * 0.45; 
                const skala = targetW / halEmbed.width;

                // Gambar Resi di posisi PALING ATAS
                page.drawPage(halEmbed, {
                    x: 0,
                    y: targetH - (cropHeight * skala), 
                    width: targetW,
                    height: halEmbed.height * skala // Tetap pakai skala asli biar gak gepeng
                });

                // --- POSISI BRANDING (PERSIS DI BAWAH RESI) ---
                // Kita hitung titik bawah resi setelah di-zoom
                const titikBawahResi = targetH - (cropHeight * skala);

                // 1. Logo (Persis di bawah resi)
                if (logoImg) {
                    page.drawImage(logoImg, { x: 5, y: titikBawahResi - 35, width: 30, height: 30 });
                }

                // 2. Nama Toko (Sejajar Logo)
                page.drawText(tokoName, {
                    x: logoImg ? 40 : 10,
                    y: titikBawahResi - 25,
                    size: 16,
                    font: fontBold,
                    color: rgb(0, 0, 0)
                });

                // 3. WAJIB VIDEO UNBOXING (Gede & Merah di bawah Nama Toko)
                page.drawText("WAJIB VIDEO UNBOXING UNTUK KLAIM!", {
                    x: 10,
                    y: titikBawahResi - 50,
                    size: 11,
                    font: fontBold,
                    color: rgb(0.8, 0, 0)
                });
            }

            const res = await pdfOut.save();
            const url = URL.createObjectURL(new Blob([res], {type: 'application/pdf'}));
            const a = document.createElement('a');
            a.href = url;
            a.download = "RESI_HEMAT_KERTAS.pdf";
            a.click();
            status.innerText = "BERHASIL! Cek download.";
        } catch (e) { status.innerText = "Error: " + e.message; }
    }
</script>
</body>
</html>
